appId: com.agentnotch.app
productName: AgentNotch
directories:
  output: dist
files:
  - src/**/*
  - assets/**/*
  - "!**/*.map"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icons/icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icons/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
